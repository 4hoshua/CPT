server {
    listen 80;
    server_name _;

    # Allow uploads larger than nginx's 1m default (Packet Tracer files/XML).
    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA, falling back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend service on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
